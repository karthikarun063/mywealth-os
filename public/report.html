<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Financial Report — MyWealth OS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/css/report.css"/>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-dark rp-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand rp-brand" href="/">
      <div class="rp-logo-icon">₹</div>
      MyWealth OS
    </a>
    <div class="d-flex gap-2 align-items-center">
      <a href="/strategy.html" class="btn btn-sm rp-btn-ghost">Strategy →</a>
      <a href="/" class="btn btn-sm rp-btn-ghost">← Dashboard</a>
    </div>
  </div>
</nav>

<!-- ── Hero action bar ── -->
<div class="rp-action-bar d-print-none">
  <div class="container-xl px-4">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div>
        <h1 class="rp-page-title">AI Financial Report</h1>
        <p class="rp-page-sub" id="rp-gen-date">Generating your report…</p>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <button class="rp-btn rp-btn-outline" id="btn-refresh" onclick="Report.load()">↻ Refresh</button>
        <button class="rp-btn rp-btn-share"   id="btn-share"   onclick="Report.shareScore()" disabled>📤 Share Score</button>
        <button class="rp-btn rp-btn-pdf"     id="btn-pdf"     onclick="Report.downloadPDF()" disabled>⬇ Download PDF</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Main content ── -->
<div class="container-xl px-4 py-4" id="rp-main">
  <div class="rp-loading" id="rp-loading">
    <div class="rp-spinner"></div>
    <p>Analysing your financial data with AI…</p>
  </div>
  <div id="rp-content" class="d-none"></div>
</div>

<!-- ── Toast ── -->
<div class="rp-toast" id="rp-toast"></div>

<script src="/js/report.js"></script>
</body>
</html>
